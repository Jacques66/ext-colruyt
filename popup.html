<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Totaux par rayon — réglages</title>
  <style>
    :root {
      --cg-blue: #1C3661;
      --cg-blue-bright: #0055A2;
      --cg-orange: #F5782D;
      --cg-grey: #63708a;
      --cg-line: #e2e4ed;
      --cg-hover: #eef3fb;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      width: 320px;
      font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        Helvetica, Arial, sans-serif;
      color: var(--cg-blue);
      background: #fff;
    }
    header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--cg-line);
    }
    h1 {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
      color: var(--cg-blue);
    }
    .subtitle {
      margin: 4px 0 0;
      font-size: 11.5px;
      color: var(--cg-grey);
    }
    /* Sélecteur de langue (contrôle segmenté Auto / FR / NL). */
    .lang {
      display: flex; align-items: center; gap: 8px; margin-top: 10px;
    }
    .lang-title { font-size: 11.5px; color: var(--cg-grey); }
    .seg {
      display: inline-flex; border: 1px solid #cbd2e0; border-radius: 7px;
      overflow: hidden;
    }
    .seg button {
      font: inherit; font-size: 11.5px; color: var(--cg-blue); background: #fff;
      border: 0; border-left: 1px solid #e2e4ed; padding: 4px 10px; cursor: pointer;
      transition: background-color .12s ease, color .12s ease;
    }
    .seg button:first-child { border-left: 0; }
    .seg button:hover { background: var(--cg-hover); }
    .seg button[aria-pressed="true"] {
      background: var(--cg-blue); color: #fff; font-weight: 600;
    }
    ul {
      list-style: none;
      margin: 0;
      padding: 6px 8px;
      max-height: 420px;
      overflow-y: auto;
    }
    li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color .12s ease;
    }
    li:hover { background: var(--cg-hover); }
    .texts { flex: 1 1 auto; min-width: 0; }
    .name { font-weight: 600; }
    .hint { margin-top: 1px; font-size: 11px; color: var(--cg-grey); }
    /* Interrupteur (switch) accessible, piloté par une vraie case à cocher. */
    .switch { flex: 0 0 auto; position: relative; width: 34px; height: 20px; margin-top: 1px; }
    .switch input {
      position: absolute; opacity: 0; width: 100%; height: 100%; margin: 0; cursor: pointer;
    }
    .track {
      position: absolute; inset: 0; background: #c7cedd; border-radius: 999px;
      transition: background-color .15s ease;
    }
    .knob {
      position: absolute; top: 2px; left: 2px; width: 16px; height: 16px;
      background: #fff; border-radius: 50%; box-shadow: 0 1px 2px rgba(0,0,0,.3);
      transition: transform .15s ease;
    }
    .switch input:checked ~ .track { background: var(--cg-orange); }
    .switch input:checked ~ .knob { transform: translateX(14px); }
    .switch input:focus-visible ~ .track { box-shadow: 0 0 0 3px rgba(0,85,162,.3); }
    footer {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      padding: 10px 16px; border-top: 1px solid var(--cg-line);
    }
    .note { font-size: 10.5px; color: var(--cg-grey); }
    button.reset {
      flex: 0 0 auto; font: inherit; font-size: 11.5px; color: var(--cg-blue);
      background: #fff; border: 1px solid #cbd2e0; border-radius: 6px;
      padding: 4px 10px; cursor: pointer; white-space: nowrap;
      transition: border-color .12s ease;
    }
    button.reset:hover { border-color: var(--cg-blue-bright); }
    .courtesy {
      padding: 8px 16px 12px; text-align: center; font-size: 11px;
      color: var(--cg-grey); border-top: 1px solid var(--cg-line);
    }
    .courtesy a {
      color: var(--cg-blue-bright); font-weight: 600; text-decoration: none;
    }
    .courtesy a:hover, .courtesy a:focus { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <h1 id="title">Totaux par rayon</h1>
    <p class="subtitle" id="subtitle"></p>
    <div class="lang">
      <span class="lang-title" id="lang-title"></span>
      <span class="seg" id="lang-seg" role="group"></span>
    </div>
  </header>
  <ul id="list" aria-label="Fonctionnalités"></ul>
  <footer>
    <span class="note" id="note"></span>
    <button type="button" class="reset" id="reset"></button>
  </footer>
  <div class="courtesy" id="courtesy"></div>
  <script src="popup.js"></script>
</body>
</html>
