name: Build extension zip

# Régénère dist/ext-colruyt.zip uniquement quand une dépendance d'exécution
# change (un changement de README, docs ou tests ne déclenche donc rien).
on:
  push:
    paths:
      - 'manifest.json'
      - 'pure.js'
      - 'content.js'
      - 'icons/**'
      - 'scripts/build-zip.sh'
      - '.github/workflows/build-zip.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Construire le zip
        run: bash scripts/build-zip.sh

      - name: Committer le zip s'il a changé
        run: |
          if [ -n "$(git status --porcelain dist/ext-colruyt.zip)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add dist/ext-colruyt.zip
            git commit -m "chore: rebuild ext-colruyt.zip [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "Aucun changement dans le zip."
          fi
